name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Kodu çek
        uses: actions/checkout@v3
      
      - name: Node.js kur
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Testleri çalıştır
        run: npm test
      
      - name: Başarılı mesajı
        run: echo "🎉 Pipeline tamamlandı!"
